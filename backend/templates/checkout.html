<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <link rel="stylesheet" href="/backend/static/css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="container nav">
      <h1>Finalizar pedido</h1>
      <nav>
        <a href="index.html" class="nav-link">Catálogo</a>
        <a href="admin-orders.html" class="nav-link">Pedidos</a>
        <a href="cart.html" class="cart-link">
          <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Carrito">
        </a>
      </nav>
    </div>
  </header>

  <main class="container checkout-grid">
    <section>
      <h2>Datos del cliente</h2>
      <form id="checkoutForm" class="checkout-form">
        <input type="text" id="customer_name" placeholder="Nombre completo" required />
        <input type="email" id="customer_email" placeholder="Correo electrónico" required />
        <input type="text" id="customer_phone" placeholder="Número de teléfono" required />
        <button type="submit" class="btn">Confirmar pedido</button>
      </form>
      <div id="checkoutMessage"></div>
    </section>

    <section>
      <h2>Resumen</h2>
      <div id="checkoutSummary" class="summary-box"></div>
    </section>
  </main>

  <script src="/backend/static/js/checkout.js"></script>
</body>

</html>
