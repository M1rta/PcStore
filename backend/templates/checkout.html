<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar pedido | TechHardware</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <h1>Finalizar pedido</h1>
      <nav>
        <span id="welcomeUser" class="nav-link"></span>
        <a href="{{ url_for('catalog_page') }}" class="nav-link">Catalogo</a>
        <a href="{{ url_for('orders_page') }}" class="nav-link">Mis pedidos</a>
        <a href="{{ url_for('cart_page') }}" class="cart-link">
          <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Carrito">
        </a>
        <button type="button" id="logoutBtn" class="btn">Cerrar sesion</button>
      </nav>
    </div>
  </header>

  <main class="container checkout-grid">
    <section>
      <h2>Datos de entrega</h2>
      <form id="checkoutForm" class="checkout-form">
        <input type="text" id="customer_name" placeholder="Nombre completo" required />
        <input type="email" id="customer_email" placeholder="Correo electronico" required />
        <input type="text" id="customer_phone" placeholder="Numero de telefono" required />
        <button type="submit" class="btn">Confirmar pedido</button>
      </form>
      <div id="checkoutMessage"></div>
    </section>

    <section>
      <h2>Resumen</h2>
      <div id="checkoutSummary" class="summary-box"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/checkout.js') }}"></script>
</body>
</html>
