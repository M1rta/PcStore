<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión en tu cuenta de TechHardware para comprar componentes y revisar tus pedidos." />
  <meta name="keywords" content="tienda, componentes, tecnologia, login, Costa Rica" />
  <title>Iniciar sesion | TechHardware</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
</head>
<body>
  <main class="login-container">
    <section class="login-card">
      <h1 class="login-title">Bienvenido a TechHardware</h1>
      <p class="login-subtitle">Inicia sesion para comprar, guardar tu carrito y administrar tus pedidos.</p>

      <form id="login-form" autocomplete="on">
        <div class="input-group">
          <input type="email" id="email" placeholder="Correo electronico" required />
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Contrasena" required />
        </div>

        <button type="submit" class="login-btn">Entrar a mi cuenta</button>

        <div class="login-link">
          No tienes cuenta? <a href="{{ url_for('register_page') }}">Crear cuenta</a>
        </div>
      </form>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
